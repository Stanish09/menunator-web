<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konto potwierdzone – Menunator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #e87722;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111; }
      .card { background: #1e1e1e; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
      h1 { color: #f0f0f0; }
      p { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Konto potwierdzone!</h1>
    <p>Twój adres e-mail został zweryfikowany. Wróć do aplikacji i zaloguj się.</p>
    <a class="btn" href="menunator://">Otwórz Menunator</a>
  </div>
</body>
</html>
