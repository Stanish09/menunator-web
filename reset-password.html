<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetowanie hasła – Menunator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #e87722;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .error { color: #e53e3e; font-size: 14px; margin-top: 16px; display: none; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; }
      .card { background: #1e1e1e; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
      h1 { color: #f0f0f0; }
      p { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Ustaw nowe hasło</h1>
    <p>Kliknij poniżej, żeby otworzyć aplikację Menunator i wpisać nowe hasło.</p>
    <a class="btn" id="openBtn" href="#">Otwórz Menunator</a>
    <p class="error" id="errorMsg">
      Nie udało się otworzyć aplikacji automatycznie.<br>
      Upewnij się, że masz zainstalowaną aplikację Menunator.
    </p>
  </div>

  <script>
    var hash = window.location.hash; // #access_token=...&type=recovery
    var appUrl = 'menunator://reset-password' + hash;

    document.getElementById('openBtn').href = appUrl;

    // Auto-redirect on load
    window.location.href = appUrl;

    // Show error if still on page after 2s (app didn't open)
    setTimeout(function () {
      document.getElementById('errorMsg').style.display = 'block';
    }, 2000);
  </script>
</body>
</html>
